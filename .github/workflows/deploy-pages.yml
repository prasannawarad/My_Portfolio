# Builds the Vite app and publishes to GitHub Pages.
# Repo → Settings → Pages → set "Source" to GitHub Actions (not "Deploy from a branch")
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      # Only pass VITE_CHAT_API_URL when the repo secret is set; an empty value would
      # override committed .env.production and break the chat (Vite prefers process env).
      - name: Build
        run: |
          if [ -n "${VITE_CHAT_API_URL_SECRET:-}" ]; then
            export VITE_CHAT_API_URL="$VITE_CHAT_API_URL_SECRET"
          fi
          npm run build
        env:
          VITE_CHAT_API_URL_SECRET: ${{ secrets.VITE_CHAT_API_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
